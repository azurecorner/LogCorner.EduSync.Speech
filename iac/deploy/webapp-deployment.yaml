apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-demo-app
  namespace: sre-agent-demo
  labels:
    app: webapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: webapp
  template:
    metadata:
      labels:
        app: webapp
    spec:
      containers:
        - name: otel-demo-app
          image: datasynchroacr.azurecr.io/web-app:latest
          ports:
            - containerPort: 5000
          env:
            - name: ASPNETCORE_URLS
              value: http://+:5000
            - name: ASPNETCORE_ENVIRONMENT
              value: Kubernetes
            