apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-demo-api
  namespace: sre-agent-demo
  labels:
    app: webapi
spec:
  replicas: 1
  selector:
    matchLabels:
      app: webapi
  template:
    metadata:
      labels:
        app: webapi
    spec:
      containers:
        - name: otel-demo-api
          image: datasynchroacr.azurecr.io/web-api:latest
          ports:
            - containerPort: 5000
          env:
            - name: ASPNETCORE_URLS
              value: http://+:5000
            - name: ASPNETCORE_ENVIRONMENT
              value: Kubernetes
