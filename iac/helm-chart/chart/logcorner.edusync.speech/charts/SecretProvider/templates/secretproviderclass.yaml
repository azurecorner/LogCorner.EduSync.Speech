# the content of secretproviderclass.yaml
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: {{ .Values.secretProviderClassName }}
  namespace: default
spec:
  provider: azure
  secretObjects:                               
  - secretName: {{ .Values.secretName }}
    type: kubernetes.io/tls
    data: 
    - objectName: {{ .Values.certificateName }}
      key: tls.key
    - objectName: {{ .Values.certificateName }}
      key: tls.crt
  parameters:
    cloudName: AzurePublicCloud
    usePodIdentity: "false"
    useVMManagedIdentity: "true"          # Set to true for using managed identity
    userAssignedIdentityID: "43ca2685-7cca-4af6-93fa-9dc2cff1d070"
    provider: azure
    keyvaultName: {{ .Values.keyvaultName }}            # the name of the KeyVault
    objects: |
      array:
        - |
          objectName: {{ .Values.certificateName }}
          objectType: secret
    tenantId: {{ .Values.tenantId }}       # the tenant ID of the KeyVault


