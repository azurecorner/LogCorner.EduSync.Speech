# templates/deployment.yaml

apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "aks-command-api.fullname" . }}-deployment
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "aks-command-api.fullname" . }}
  template:
    metadata:
      labels:
        app: {{ include "aks-command-api.fullname" . }}
    spec:
      containers:
      - name: aks-command-api
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - containerPort: {{ .Values.service.targetPort }}
        env:
        - name: TITLE
          value: "{{ .Values.env.title }}"
        - name: ASPNETCORE_ENVIRONMENT
          value: "{{ .Values.env.aspnetcoreEnvironment }}"
        - name: SQL_SERVER
          valueFrom:
            configMapKeyRef:
              name: mssql-config
              key: {{ .Values.configMapRef.sqlServerKey }}
        - name: DB_NAME
          valueFrom:
            configMapKeyRef:
              name: mssql-config
              key: {{ .Values.configMapRef.dbNameKey }}
        - name: USER_NAME
          valueFrom:
            configMapKeyRef:
              name: mssql-config
              key: {{ .Values.configMapRef.userNameKey }}
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mssql
              key: {{ .Values.secretRef.dbPasswordKey }}
        - name: ConnectionStrings__SpeechDB
          value: "{{ .Values.connectionStringTemplate }}"
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "aks-command-api.fullname" . }}-service
spec:
  type: {{ .Values.service.type }}
  ports:
  - port: {{ .Values.service.port }}
    targetPort: {{ .Values.service.targetPort }}
  selector:
    app: {{ include "aks-command-api.fullname" . }}