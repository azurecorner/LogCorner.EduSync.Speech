apiVersion: apps/v1
kind: Deployment
metadata:
  name: aks-command-api-deployment  
 # namespace: helm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aks-command-api
  template:
    metadata:
      labels:
        app: aks-command-api
    spec:
      containers:
      - name: aks-command-api
        image: locornermsacrdev.azurecr.io/logcorner.edusync.speech.command:1104
        ports:
        - containerPort: 8080  
        env:
        - name: TITLE
          value: "Welcome to Azure Kubernetes Service (AKS)"
        - name: ASPNETCORE_ENVIRONMENT
          value: "Kubernetes"
         # Reference the ConfigMap for non-sensitive connection details
        - name: SQL_SERVER
          valueFrom:
            configMapKeyRef:
              name: mssql-config
              key: SQL_SERVER
        - name: DB_NAME
          valueFrom:
            configMapKeyRef:
              name: mssql-config
              key: DB_NAME
        - name: USER_NAME
          valueFrom:
            configMapKeyRef:
              name: mssql-config
              key: USER_NAME
        # Reference the Secret for the password
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mssql
              key: DB_PASSWORD
        - name: ConnectionStrings__SpeechDB
          value: "Data Source=$(SQL_SERVER);Initial Catalog=$(DB_NAME);User=$(USER_NAME);Password=$(DB_PASSWORD)"
---
apiVersion: v1
kind: Service
metadata:
  name: aks-command-api-service 
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 8080  # Updated to match the container's listening port
  selector:
    app: aks-command-api