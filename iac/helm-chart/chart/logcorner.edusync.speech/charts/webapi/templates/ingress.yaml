apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: edusync-ingress
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  ingressClassName: nginx
  rules:
  - http:
      paths:
      - path: /speech-command-http-api(/|$)(.*)
        pathType: Prefix
        backend:
          service:
            name: logcorner-command-http-api-service
            port:
              number: 80
      
       - path: /swagger(/|$)(.*)  # Add Swagger path
        pathType: Prefix
        backend:
          service:
            name: logcorner-command-http-api-service
            port:
              number: 80
