{{- /*
 helm repo add ingress-nginx https://kubernetes.github.io/ingress-nginx
helm repo update
helm install ingress-nginx ingress-nginx/ingress-nginx --namespace helm --create-namespace 
*/ -}}


apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: logcorner-command-http-api-ingress
  namespace: helm
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  ingressClassName: nginx  # Ensure this matches your ingress controller's class name
  rules:
  - host: kubernetes.docker.com  # Replace with your actual domain or IP (curl http://kubernetes.docker.com/WeatherForecast)
    http:
      paths:
      - path: /speech-command-http-api(/|$)(.*)
        pathType: Prefix
        backend:
          service:
            name: logcorner-command-http-api-service
            port:
              number: 80
