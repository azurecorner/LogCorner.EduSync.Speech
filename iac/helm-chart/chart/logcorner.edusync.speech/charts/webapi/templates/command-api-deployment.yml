apiVersion: apps/v1
kind: Deployment

metadata:
  name: {{ .Release.Name }}-{{ .Chart.Name }}-deployment
  namespace: helm
  labels:
    product: {{ .Release.Name }}-{{ .Chart.Name }}
    environment: helm
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}-{{ .Chart.Name }}
      env: helm
  
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-{{ .Chart.Name }}
        env: helm
    spec:
      containers:
      - name: {{ .Release.Name }}-{{ .Chart.Name }}-container
        image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
        imagePullPolicy: {{ .Values.imagePullPolicy }}
        env:
        - name: ASPNETCORE_ENVIRONMENT
          value: "Development"
        # Reference the ConfigMap for non-sensitive connection details
        - name: SQL_SERVER
          valueFrom:
            configMapKeyRef:
              name: mssql-config
              key: SQL_SERVER
        - name: DB_NAME
          valueFrom:
            configMapKeyRef:
              name: mssql-config
              key: DB_NAME
        - name: USER_NAME
          valueFrom:
            configMapKeyRef:
              name: mssql-config
              key: USER_NAME
        # Reference the Secret for the password
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mssql
              key: DB_PASSWORD
        - name: ConnectionStrings__SpeechDB
          value: "Data Source=$(SQL_SERVER);Initial Catalog=$(DB_NAME);User=$(USER_NAME);Password=$(DB_PASSWORD)"
        ports:
        - containerPort: 80
        - containerPort: 443
          protocol: TCP
      restartPolicy: {{ .Values.restartPolicy }}
      terminationGracePeriodSeconds: 30
      dnsPolicy: ClusterFirst
      
    