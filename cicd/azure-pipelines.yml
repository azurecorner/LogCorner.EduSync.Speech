# Starter pipeline
# Start with a minimal pipeline that you can customize to build and deploy your code.
# Add steps that build, run tests, deploy, and more:
# https://aka.ms/yaml
variables:
- name: repository
  value: locornermsacrdev
- name: imageName
  value: logcorner.edusync.speech.command
- name: serviceConnectionName
  value: 'BICEP-SP'
trigger:
- master

pool:
  vmImage: ubuntu-latest

steps:
- script: echo Hello, world!
  displayName: 'Run a one-line script'

- script: |
    echo Add other tasks to build, test, and deploy your project.
    echo See https://aka.ms/yaml
  displayName: 'Run a multi-line script'
- task: Bash@3
  inputs:
    targetType: 'inline'
    script: |
      echo "Checking if chart path exists..."
      ls -al $(System.DefaultWorkingDirectory)/
      if [ -d "$(System.DefaultWorkingDirectory)/iac/helm-chart/chart/logcorner.edusync.speech.command" ]; then
        echo "Chart path exists."
      else
        echo "Chart path does not exist."
      fi


- task: Docker@2
  enabled: true
  displayName: Docker Build
  inputs:
    repository: '$(repository)'
    command: 'build'
    Dockerfile: '/**/LogCorner.EduSync.Speech.Presentation/Dockerfile'
    buildContext: 'src'
    arguments: '-t $(repository).azurecr.io/$(imageName):$(Build.BuildId)'
- task: AzureCLI@2
  enabled: true
  displayName: Docker Push
  inputs:
    azureSubscription: $(serviceConnectionName)
    scriptType: 'bash'
    scriptLocation: 'inlineScript'
    inlineScript: |
      accessToken=$(az acr login --name $(repository) --expose-token --output tsv --query accessToken)
      echo $accessToken | docker login $(repository).azurecr.io --username 00000000-0000-0000-0000-000000000000 --password-stdin
      docker push $(repository).azurecr.io/$(imageName):$(Build.BuildId)
- task: HelmDeploy@1
  inputs:
    connectionType: 'Azure Resource Manager'
    azureSubscription: 'BICEP-SP'
    azureResourceGroup: 'rg-edusync-dev'
    kubernetesCluster: 'aks-edusync-dev'
    namespace: 'helm'
    command: 'install'
    chartType: 'FilePath'
    chartPath: '$(System.DefaultWorkingDirectory)/iac/helm-chart/chart/logcorner.edusync.speech.command'
    chartVersion: '1.0.0'
    releaseName: 'logcorner-command'